name: Release Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ─── Desktop: Windows / macOS / Linux ───────────────────────────────────────
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x64
            platform: windows
          - os: windows-latest
            target: i686-pc-windows-msvc
            arch: x86
            platform: windows
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            arch: x64
            platform: linux
          - os: macos-latest
            target: x86_64-apple-darwin
            arch: x64
            platform: macos
          - os: macos-latest
            target: aarch64-apple-darwin
            arch: arm64
            platform: macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libglib2.0-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Ciphora ${{ github.ref_name }}"
          releaseBody: |
            ## Ciphora ${{ github.ref_name }}

            ### 下载说明

            请根据您的系统选择对应的安装包：

            - **Windows x64**: `Ciphora_*_x64-setup.exe`
            - **Windows x86**: `Ciphora_*_x86-setup.exe`
            - **macOS Apple Silicon**: `Ciphora_*_aarch64.dmg`
            - **macOS Intel**: `Ciphora_*_x64.dmg`
            - **Linux**: `Ciphora_*_amd64.AppImage` 或 `.deb`
            - **Android**: `Ciphora_*.apk`
            - **iOS**: `Ciphora_*.ipa`（需要自签或 TestFlight）
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

  # ─── Android ────────────────────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Install Rust stable + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: |
            aarch64-linux-android
            armv7-linux-androideabi
            i686-linux-android
            x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Initialize Tauri Android project
        run: npm run tauri:android:init

      - name: Build Android APK (debug)
        run: npm run tauri:android:build -- --apk
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.ref_name }}
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          retention-days: 30

      - name: Upload Android APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── iOS ────────────────────────────────────────────────────────────────────
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Rust stable + iOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: |
            aarch64-apple-ios
            aarch64-apple-ios-sim
            x86_64-apple-ios

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Initialize Tauri iOS project
        run: npm run tauri:ios:init

      - name: Build iOS (simulator, no signing)
        run: |
          npm run tauri:ios:build -- --target aarch64-apple-ios-sim
        env:
          # 无证书时跳过签名，产物为未签名 ipa（仅限模拟器测试）
          # 若要发布到 App Store，需配置 APPLE_CERTIFICATE / APPLE_PROVISIONING_PROFILE
          CODE_SIGNING_ALLOWED: NO

      - name: Package iOS build as IPA
        run: |
          mkdir -p ios-artifacts
          find src-tauri/gen/apple -name "*.app" | head -1 | xargs -I {} bash -c '
            mkdir -p Payload
            cp -r "{}" Payload/
            zip -r ios-artifacts/Ciphora-${{ github.ref_name }}-simulator.ipa Payload
            rm -rf Payload
          '

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-${{ github.ref_name }}
          path: ios-artifacts/*.ipa
          retention-days: 30

      - name: Upload iOS IPA to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ios-artifacts/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
